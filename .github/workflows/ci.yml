name: CI/CD — RialoPredict

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────
# JOB 1: Lint + Typecheck
# ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0 || true

# ─────────────────────────────────────────────────────────────
# JOB 2: Build
# ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_RIALO_RPC_DEVNET:  ${{ secrets.VITE_RIALO_RPC_DEVNET }}
          VITE_RIALO_RPC_TESTNET: ${{ secrets.VITE_RIALO_RPC_TESTNET }}
          VITE_PROGRAM_ID:        ${{ secrets.VITE_PROGRAM_ID }}
          VITE_MAGIC_KEY:         ${{ secrets.VITE_MAGIC_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

# ─────────────────────────────────────────────────────────────
# JOB 3: Deploy to Vercel (main branch only)
# ─────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy preview to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
        id: vercel-preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n🔗 ${process.env.PREVIEW_URL}\n\n_Deployed from commit \`${context.sha.slice(0,7)}\`_`,
            })
        env:
          PREVIEW_URL: ${{ steps.vercel-preview.outputs.preview-url }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.vercel-prod.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Vercel production
        uses: amondnet/vercel-action@v25
        id: vercel-prod
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       "--prod"
          working-directory: ./

      - name: Notify deployment
        run: |
          echo "✅ Production deployed to: ${{ steps.vercel-prod.outputs.preview-url }}"

# ─────────────────────────────────────────────────────────────
# JOB 4: Contract Tests (on Anchor-compatible branches)
# ─────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[test-contracts]') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli
          anchor --version

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm ci

      - name: Start local validator
        run: |
          solana-test-validator --reset --quiet &
          sleep 5

      - name: Build contract
        run: anchor build
        working-directory: contracts

      - name: Run tests
        run: anchor test --skip-local-validator
        working-directory: contracts
        env:
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
          ANCHOR_WALLET:       ~/.config/solana/id.json
