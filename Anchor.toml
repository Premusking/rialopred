[toolchain]
anchor_version = "0.29.0"

[features]
seeds = true
skip-lint = false

[programs.devnet]
prediction_market = "PREDriAL0xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[programs.testnet]
prediction_market = "PREDriAL0xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[programs.mainnet]
prediction_market = "PREDriAL0xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[registry]
url = "https://api.apr.dev"

[provider]
cluster   = "devnet"
wallet    = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 contracts/tests/**/*.ts"

[[test.validator.clone]]
address = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"  # USDC mainnet (for fork tests)

[rialo]
rpc_devnet   = "https://devnet.rialo.io/rpc"
rpc_testnet  = "https://testnet.rialo.io/rpc"
rpc_mainnet  = "https://mainnet.rialo.io/rpc"
async_engine = true       # Enable Rialo's native async HTTP + event scheduling
http_oracle  = true       # Allow contracts to make HTTPS calls
